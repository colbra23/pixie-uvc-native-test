plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.pixielook.uvctest'
    compileSdk 35

    defaultConfig {
        applicationId 'com.pixielook.uvctest'
        minSdk 24
        // targetSdk intentionally kept below 31 for early UVC compatibility testing.
        // Later Pixie production builds can raise this after the camera path is proven.
        targetSdk 28
        versionCode 1
        versionName '0.1-camera-smoke-test'
    }

    buildTypes {
        debug {
            minifyEnabled false
        }
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = '17'
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.13.1'
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'com.github.jiangdongguo.AndroidUSBCamera:libausbc:3.3.3'
}
