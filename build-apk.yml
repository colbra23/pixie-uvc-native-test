name: Build Pixie UVC APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        run: gradle :app:assembleDebug --stacktrace

      - name: Rename APK
        run: |
          mkdir -p output
          cp app/build/outputs/apk/debug/app-debug.apk output/pixie-uvc-minimal-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pixie-uvc-minimal-debug-apk
          path: output/pixie-uvc-minimal-debug.apk
